<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>S Y S T E M _ O V E R R I D E</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41; 
            font-family: "Courier New", Courier, monospace;
            /* Flexbox centering */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #00ff41;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #terminal {
            width: 80%;
            max-width: 600px;
            border: 2px solid #00ff41;
            padding: 40px; /* Increased padding for better centering look */
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            position: relative;
            z-index: 1;
            text-align: center; /* Centers the text inside the terminal */
        }

        #boot-screen {
            text-align: center;
        }

        button {
            background: #00ff41;
            color: black;
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover { background: #008f11; }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #00ff41;
            color: #00ff41;
            font-family: inherit;
            font-size: 1.2rem;
            outline: none;
            width: 100%;
            text-align: center; /* Centers the dots in the password box */
            margin-top: 10px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<audio id="morseAudio" loop>
    <source src="morse.wav" type="audio/wav">
</audio>

<div id="terminal">
    <div id="boot-screen">
        <p>TERMINAL ID: 77-B / STATUS: ENCRYPTED</p>
        <button onclick="startSystem()">INITIALIZE SYSTEM</button>
    </div>

    <div id="main-system" class="hidden">
        <p>UNAUTHORIZED ACCESS DETECTED...</p>
        <p>ENTER PASSCODE:</p>
        <input type="password" id="passInput" onkeydown="checkPass(event)" autofocus>
        <p id="feedback" style="margin-top: 20px; color: #ff0000;"></p>
    </div>
</div>

<script>
    const morse = document.getElementById('morseAudio');

    function startSystem() {
        document.getElementById('boot-screen').classList.add('hidden');
        document.getElementById('main-system').classList.remove('hidden');
        document.getElementById('passInput').focus();
        
        morse.play().catch(e => console.log("Audio file 'morse.wav' not found."));
    }

    function checkPass(event) {
        if (event.key === "Enter") {
            const val = document.getElementById('passInput').value.trim().toUpperCase();
            
            if (btoa(val) === "Q0hST05PU19GUkFDVFVSRQ==") {
                document.getElementById('feedback').style.color = "#00ff41";
                document.getElementById('feedback').innerText = "ACCESS GRANTED. REDIRECTING...";
                
                setTimeout(() => {
                    window.location.href = val + ".html";
                }, 1500);
            } else {
                document.getElementById('feedback').innerText = "INCORRECT CREDENTIALS.";
                document.getElementById('passInput').value = "";
            }
        }
    }
</script>

</body>
</html>
