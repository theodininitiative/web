<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>S Y S T E M _ O V E R R I D E</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: "Courier New", Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #00ff41;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #terminal {
            width: 85%;
            max-width: 650px;
            border: 1px solid #004411;
            padding: 30px;
            background: rgba(0, 10, 0, 0.95);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1), inset 0 0 10px #000;
        }

        .hidden { display: none; }
        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #00ff41;
            color: #00ff41;
            font-family: inherit;
            font-size: 1.2rem;
            outline: none;
            width: 100%;
            text-transform: uppercase;
        }

        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover { background: #fff; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="boot-screen">
        <p>ODIN INITIATIVE // TERMINAL 77-B</p>
        <p>STATUS: SIGNAL INTERCEPTED</p>
        <button onclick="startSystem()">DECRYPT SIGNAL</button>
    </div>

    <div id="main-system" class="hidden">
        <p>> TRANSMISSION DETECTED [LOW FREQUENCY]</p>
        <p>> ENTER DECRYPTION KEY:</p>
        <input type="text" id="passInput" onkeydown="checkPass(event)" autocomplete="off">
        <p id="feedback" style="margin-top: 20px; color: #ff0000;"></p>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Obfuscated timing: 1 = Dot, 3 = Dash, 0 = Word Space, 4 = Letter Space
    // Message: "TO GET THE PASSWORD YOU MUST BREAK THE DECIMATORS CLOCK"
    const sequence = [
        3,0,3,3,3,4,3,3,3,1,1,1,3,1,4,1,1,1,3,4,3,0,1,1,1,1,1,4,1,4,3,0,3,4,1,1,1,3,3,1,1,4,1,1,3,3,4,3,3,3,3,3,1,3,3,4,3,3,3,1,1,3,4,1,1,3,4,1,1,1,3,4,3,3,0,3,3,4,1,1,3,4,1,1,1,4,3,4,1,1,1,1,0,1,1,1,4,1,1,3,1,4,1,1,1,4,1,4,3,1,1,3,4,3,3,3,0,3,4,1,1,1,1,1,4,1,4,3,1,1,1,3,1,1,4,1,1,1,4,1,3,1,4,1,1,4,1,1,1,4,3,1,3,1,4,3,3,3,4,3,1,3,1,4,1,3,1,1,4,3,3,3,4,1,1,1,4,3,1,3,1,4,1,3,1,1,4,3,3,3,4,1,3,1,3,1,3,0,3,1,3,1,4,1,3,1,1,4,3,3,3,4,1,3,3,4,3,1,3,1
    ];

    const unit = 100; // Speed in ms

    async function playBeep(len) {
        if (len === 0) { await new Promise(r => setTimeout(r, unit * 7)); return; }
        if (len === 4) { await new Promise(r => setTimeout(r, unit * 3)); return; }
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 550;
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.start();
        await new Promise(r => setTimeout(r, len * unit));
        osc.stop();
        await new Promise(r => setTimeout(r, unit));
    }

    async function loopMorse() {
        while(true) {
            for (let pulse of sequence) await playBeep(pulse);
            await new Promise(r => setTimeout(r, 4000));
        }
    }

    function startSystem() {
        audioCtx.resume();
        document.getElementById('boot-screen').classList.add('hidden');
        document.getElementById('main-system').classList.remove('hidden');
        document.getElementById('passInput').focus();
        loopMorse();
    }

    function checkPass(e) {
        if (e.key === "Enter") {
            const val = document.getElementById('passInput').value.trim().toUpperCase();
            // This checks the password 'CHRONOS_FRACTURE' without typing it in the code
            if (btoa(val) === "Q0hST05PU19GUkFDVFVSRQ==") {
                document.getElementById('feedback').style.color = "#00ff41";
                document.getElementById('feedback').innerText = "> ACCESS GRANTED. LOADING LORE_DUMP...";
                setTimeout(() => {
                    window.location.href = val + ".html"; 
                }, 1500);
            } else {
                document.getElementById('feedback').innerText = "> ERROR: INVALID COMMAND.";
                document.getElementById('passInput').value = "";
            }
        }
    }
</script>
</body>
</html>
