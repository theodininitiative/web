<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>S Y S T E M _ O V E R R I D E</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: "Courier New", Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #00ff41;
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #terminal {
            width: 85%;
            max-width: 650px;
            border: 1px solid #004411;
            padding: 30px;
            background: rgba(0, 10, 0, 0.95);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1), inset 0 0 10px #000;
            position: relative;
        }

        .hidden { display: none; }
        
        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #00ff41;
            color: #00ff41;
            font-family: inherit;
            font-size: 1.2rem;
            outline: none;
            width: 100%;
            text-transform: uppercase;
        }

        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }

        #glitch-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #00ff41;
            opacity: 0;
            pointer-events: none;
            z-index: 11;
        }
    </style>
</head>
<body>

<div id="glitch-overlay"></div>

<div id="terminal">
    <div id="boot-screen">
        <p>ODIN INITIATIVE // CORE TERMINAL 77-B</p>
        <p>LOG_FILE: FRACTURED</p>
        <button onclick="startSystem()">ACCESS SYSTEM</button>
    </div>

    <div id="main-system" class="hidden">
        <p>> UNAUTHORIZED ACCESS DETECTED</p>
        <p>> LISTENING FOR SUB-AUDIO CLUES...</p>
        <p style="margin-top: 40px;">ENTER OVERRIDE COMMAND:</p>
        <input type="text" id="passInput" onkeydown="checkPass(event)" autocomplete="off">
        <p id="feedback" style="margin-top: 20px; color: #ff0000; min-height: 1.2em;"></p>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // 1 = dot, 3 = dash, 0 = space
    const mData = [3,3,0,3,3,3,0,1,1,3,1,0,1,0,3,0,1,1,3,1,0,3,1,1,0,3,3,3,0,3,3,3,0,1,1,3,0,3,1,3,3,0,3,3,3,0,1,1,3,0,3,3,0,1,1,3,0,1,1,1,0,3,0,3,1,1,0,1,1,1,1,0,1,1,3,0,1,1,3,1,0,1,0,1,3,1,0,3,1,3,3,0,3,0,1,1,1,1,0,1,0,3,1,1,1,0,1,1,1,0,1,3,1,0,1,1,0,1,1,1,0,3,1,3,1,0,3,3,3,0,1,3,3,1,0,3,1,3,1,0,1,3,1,1,0,3,3,3,0,3,1,3,1,0,3,1,3,1,0,1,3,1,1,0,3,3,3,0,1,3,1,3,1,3];
    const unit = 90; // The speed of the transmission

    async function playSignal(type) {
        if (type === 0) {
            await new Promise(r => setTimeout(r, unit * 3));
            return;
        }
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 550;
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.start();
        await new Promise(r => setTimeout(r, type * unit));
        osc.stop();
        await new Promise(r => setTimeout(r, unit));
    }

    async function morseLoop() {
        while(true) {
            for (let s of mData) await playSignal(s);
            await new Promise(r => setTimeout(r, 5000));
        }
    }

    function startSystem() {
        audioCtx.resume();
        document.getElementById('boot-screen').classList.add('hidden');
        document.getElementById('main-system').classList.remove('hidden');
        document.getElementById('passInput').focus();
        morseLoop();
    }

    function checkPass(e) {
        if (e.key === "Enter") {
            const input = document.getElementById('passInput').value.trim().toUpperCase();
            // We don't check the password here. 
            // We just try to navigate to [PASSWORD].html
            // If the user is wrong, they hit a 404. If right, they hit your lore page.
            document.getElementById('feedback').style.color = "#00ff41";
            document.getElementById('feedback').innerText = "> CALCULATING VECTOR...";
            
            setTimeout(() => {
                window.location.href = "./" + input + ".html";
            }, 1000);
        }
    }
</script>
</body>
</html>
