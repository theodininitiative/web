<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>S Y S T E M _ O V E R R I D E</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: "Courier New", Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #00ff41;
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #terminal {
            width: 85%;
            max-width: 650px;
            border: 1px solid #004411;
            padding: 30px;
            background: rgba(0, 10, 0, 0.95);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1), inset 0 0 10px #000;
        }

        .hidden { display: none; }
        
        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #00ff41;
            color: #00ff41;
            font-family: inherit;
            font-size: 1.2rem;
            outline: none;
            width: 100%;
            text-transform: uppercase;
        }

        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover { background: #fff; }
    </style>
</head>
<body>

<audio id="morseAudio" loop>
    <source src="morse.wav" type="audio/wav">
</audio>

<div id="terminal">
    <div id="boot-screen">
        <p>ODIN INITIATIVE // TERMINAL 77-B</p>
        <p>STATUS: INTERCEPTING SIGNAL...</p>
        <button onclick="startSystem()">DECRYPT DATASTREAM</button>
    </div>

    <div id="main-system" class="hidden">
        <p>> SIGNAL STABILIZED. LISTENING...</p>
        <p>> ENTER DECRYPTION KEY:</p>
        <input type="text" id="passInput" onkeydown="checkPass(event)" autocomplete="off">
        <p id="feedback" style="margin-top: 20px; color: #ff0000; min-height: 1.2em;"></p>
    </div>
</div>

<script>
    const morse = document.getElementById('morseAudio');

    function startSystem() {
        // Show terminal and play audio
        document.getElementById('boot-screen').classList.add('hidden');
        document.getElementById('main-system').classList.remove('hidden');
        document.getElementById('passInput').focus();
        
        // Browsers require a user click to play audio
        morse.play().catch(error => {
            console.log("Audio failed to play. Check if morse.wav is in the root folder.");
        });
    }

    function checkPass(e) {
        if (e.key === "Enter") {
            const val = document.getElementById('passInput').value.trim().toUpperCase();
            
            // Base64 check for 'CHRONOS_FRACTURE'
            if (btoa(val) === "Q0hST05PU19GUkFDVFVSRQ==") {
                document.getElementById('feedback').style.color = "#00ff41";
                document.getElementById('feedback').innerText = "> ACCESS GRANTED. OPENING ARCHIVE...";
                
                setTimeout(() => {
                    // Redirects to CHRONOS_FRACTURE.html
                    window.location.href = val + ".html"; 
                }, 1500);
            } else {
                document.getElementById('feedback').innerText = "> ERROR: INCORRECT COMMAND.";
                document.getElementById('passInput').value = "";
            }
        }
    }
</script>
</body>
</html>
